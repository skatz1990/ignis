apiVersion: batch/v1
kind: Job
metadata:
  name: ignis-skew-job
  namespace: ignis-dev
spec:
  backoffLimit: 0
  template:
    spec:
      initContainers:
        - name: fix-log-perms
          image: busybox:latest
          command: ["sh", "-c", "rm -f /mnt/spark-logs/* && chmod 777 /mnt/spark-logs"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: spark-logs
              mountPath: /mnt/spark-logs
      containers:
        - name: spark
          image: apache/spark:3.5.8-python3
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-c"]
          args:
            - |
              mkdir -p /mnt/spark-logs && \
              /opt/spark/bin/spark-submit \
                --master local[4] \
                --conf spark.eventLog.enabled=true \
                --conf spark.eventLog.dir=file:///mnt/spark-logs \
                --conf spark.sql.shuffle.partitions=10 \
                /app/skew_job.py; \
              echo "SPARK_DONE"; sleep 60
          volumeMounts:
            - name: script
              mountPath: /app
            - name: spark-logs
              mountPath: /mnt/spark-logs
      volumes:
        - name: script
          configMap:
            name: skew-job-script
        - name: spark-logs
          hostPath:
            path: /tmp/ignis-spark-logs
            type: DirectoryOrCreate
      restartPolicy: Never
